version: '3.8'

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      SECRET_KEY: ${SECRET_KEY:-dev-key-change-this}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-dev-key-change-this}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///smart_interview.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    command: python run.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - smart-interview

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - smart-interview

networks:
  smart-interview:
    driver: bridge
